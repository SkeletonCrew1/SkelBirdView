---
- name: Configure golden image
  hosts: all
  become: true

  vars_files:
    - vars/users.yml

  tasks:
    - name: Configure timezone
      community.general.timezone:
        name: Europe/Kyiv

    - name: Create user for each team member
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: /bin/bash
        groups: sudo
        append: true
        state: present
      loop: "{{ users }}"

    - name: Add authorized SSH key for each user
      ansible.posix.authorized_key:
        user: "{{ item.name }}"
        state: present
        key: "{{ item.ssh_key }}"
      loop: "{{ users }}"

    - name: Allow passwordless sudo for each user
      ansible.builtin.copy:
        dest: /etc/sudoers.d/team
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
        content: "%sudo ALL=(ALL:ALL) NOPASSWD: ALL\n"

    - name: Add Trivy repository
      ansible.builtin.shell: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null

    - name: Install packages
      ansible.builtin.apt:
        name:
          - git
          - trivy
          - ssh-agent
        state: present
        update_cache: true

    - name: Create Trivy log directory
      ansible.builtin.file:
        path: /var/log/trivy
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Schedule Trivy filesystem scan
      ansible.builtin.cron:
        name: "Trivy filesystem scan"
        minute: "0"
        hour: "2"
        user: root
        job: >
          trivy fs
          --scanners vuln,secret
          --severity HIGH,CRITICAL
          --skip-dirs /proc,/sys,/dev,/run,/boot,/tmp,/var/tmp,/vagrant
          --skip-dirs "**/venv,**/.venv,**/env,**/.env"
          --timeout 15m
          --format table
          --output "/var/log/trivy/security-summary-$(hostname)-$(date +\%Y-\%m-\%d-\%H-\%M).txt"
          /
