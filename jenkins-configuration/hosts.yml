---
jenkins:
  hosts:
    192.168.56.101
  vars:
    ansible_connection: ssh
    ansible_user: vagrant
    ansible_ssh_pass: vagrant
    host_key_checking: false
    ansible_ssh_common_args: -o StrictHostKeyChecking=no
    jenkins_plugins:
      - active-directory
      - ansible
      - ant
      - git
      - ssh